; BambuHelper - Bambu Lab P1S Printer Monitor
; ESP32-S3 Super Mini + 1.54" TFT ST7789 (240x240)

[env:esp32s3]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bodmer/TFT_eWidget@^0.0.6
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

build_flags =
    ; --- TFT_eSPI ST7789 configuration via build flags ---
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    ; --- SPI pins (ESP32-S3 Super Mini defaults, adjust to your wiring) ---
    -D TFT_MOSI=11
    -D TFT_SCLK=12
    -D TFT_CS=10
    -D TFT_DC=8
    -D TFT_RST=9
    -D TFT_BL=7
    ; --- SPI speed and fonts ---
    -D SPI_FREQUENCY=40000000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
